<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Strand - Footer Variant 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', Arial, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: flex-end;
        }

        .footer-link {
            color: #555555 !important;
            text-decoration: none;
            transition: color 0.3s ease;
            font-size: 14px;
            line-height: 1.55;
        }

        .footer-link:hover {
            color: #b0772c !important;
        }

        .gold-accent {
            color: #b0772c !important;
        }

        .separator-line {
            border-color: rgba(0, 0, 0, 0.1) !important;
        }
    </style>
</head>
<body>
    <footer class="w-full" style="background-color: #f5f5f5; color: #171717; padding: 48px 0 0 0;">
        <div class="mx-auto" style="max-width: 1440px; padding: 0 80px;">

            <!-- Main Footer Content -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-12 md:gap-8 pb-12">

                <!-- Column 1: Logo -->
                <div class="flex flex-col gap-4">
                    <div class="flex items-center gap-3">
                        <!-- Logo mark -->
                        <div class="w-10 h-10 flex items-center justify-center" style="border: 1.5px solid #b0772c;">
                            <span class="text-lg font-bold" style="color: #b0772c; letter-spacing: -1px;">M</span>
                        </div>
                        <div>
                            <div class="text-base font-semibold tracking-wider uppercase" style="color: #171717; letter-spacing: 3px; font-size: 14px;">Metrika</div>
                            <div class="text-xs tracking-widest uppercase" style="color: #999999; letter-spacing: 2px; font-size: 10px;">Real Estate</div>
                        </div>
                    </div>
                    <p class="mt-4 text-sm leading-relaxed" style="color: #666666; max-width: 280px; font-size: 13px; line-height: 1.7;">
                        Premium real estate services in Dubai. Your trusted partner for luxury property investments.
                    </p>
                </div>

                <!-- Column 2: Contact Us -->
                <div class="flex flex-col gap-4">
                    <h3 class="text-sm font-semibold tracking-wider uppercase mb-2" style="color: #171717; letter-spacing: 2px; font-size: 13px;">Contact Us</h3>
                    <div class="flex flex-col gap-3">
                        <div class="flex items-start gap-3">
                            <svg class="w-4 h-4 mt-0.5 flex-shrink-0" style="color: #b0772c;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
                            </svg>
                            <span class="footer-link">Dubai, Onyx Tower 2, Office 1004</span>
                        </div>
                        <div class="flex items-start gap-3">
                            <svg class="w-4 h-4 mt-0.5 flex-shrink-0" style="color: #b0772c;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                            </svg>
                            <a href="mailto:metrika.realestate@metrika.ae" class="footer-link">metrika.realestate@metrika.ae</a>
                        </div>
                        <div class="flex items-start gap-3">
                            <svg class="w-4 h-4 mt-0.5 flex-shrink-0" style="color: #b0772c;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
                            </svg>
                            <a href="tel:+97143376775" class="footer-link">+971 4 337 67 75</a>
                        </div>
                    </div>
                </div>

                <!-- Column 3: Policies -->
                <div class="flex flex-col gap-4">
                    <h3 class="text-sm font-semibold tracking-wider uppercase mb-2" style="color: #171717; letter-spacing: 2px; font-size: 13px;">Policies</h3>
                    <div class="flex flex-col gap-3">
                        <a href="#" class="footer-link">Privacy Policy</a>
                        <a href="#" class="footer-link">Cookie Policy</a>
                        <a href="#" class="footer-link">Terms of Use</a>
                    </div>
                </div>
            </div>

            <!-- Separator -->
            <hr class="separator-line" style="border-top: 1px solid rgba(0,0,0,0.1);">

            <!-- Bottom Bar -->
            <div class="py-6 text-center">
                <p class="text-xs" style="color: #999999; font-size: 13px;">&copy; 2026 Metrika. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Responsive styles -->
    <style>
        @media (max-width: 768px) {
            .mx-auto {
                padding: 0 16px !important;
            }
        }
        @media (min-width: 769px) and (max-width: 1024px) {
            .mx-auto {
                padding: 0 40px !important;
            }
        }
    </style>
</body>
</html>
